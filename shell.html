<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Worship Vector</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0d0d0d;
        color: #c0c0c0;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 20px;
        background: #161616;
        border-bottom: 1px solid #2a2a2a;
      }

      header h1 {
        font-size: 1em;
        font-weight: 600;
        color: #e0e0e0;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      #emscripten_logo {
        height: 20px;
        opacity: 0.35;
        filter: grayscale(1);
        transition: opacity 0.2s;
      }
      #emscripten_logo:hover { opacity: 0.7; }

      .game-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 16px;
        gap: 12px;
      }

      .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        height: 28px;
        min-width: 320px;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid #2a2a2a;
        border-top-color: #5a9fd4;
        border-radius: 50%;
        flex-shrink: 0;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #status {
        font-size: 0.8em;
        color: #666;
      }

      #progress {
        height: 3px;
        width: 160px;
        accent-color: #5a9fd4;
        border-radius: 2px;
      }

      canvas.emscripten {
        display: block;
        background: #000;
        border: 1px solid #2a2a2a;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        width: 640px;
        height: 480px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .toolbar label {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.8em;
        color: #888;
        cursor: pointer;
        user-select: none;
      }
      .toolbar label:hover { color: #bbb; }

      .toolbar input[type="checkbox"] {
        accent-color: #5a9fd4;
        cursor: pointer;
      }

      .toolbar input[type="button"] {
        background: #1e1e1e;
        color: #bbb;
        border: 1px solid #3a3a3a;
        padding: 4px 14px;
        cursor: pointer;
        border-radius: 3px;
        font-size: 0.8em;
        transition: background 0.15s, border-color 0.15s;
      }
      .toolbar input[type="button"]:hover {
        background: #2a2a2a;
        border-color: #555;
        color: #ddd;
      }

      .controls-panel {
        width: 640px;
        max-width: 100%;
        background: #141414;
        border: 1px solid #2a2a2a;
        border-radius: 5px;
        padding: 14px 18px;
      }

      .controls-panel h2 {
        font-size: 0.7em;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #555;
        margin-bottom: 12px;
      }

      .controls-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 32px;
      }

      .ctrl {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.82em;
      }

      .ctrl-action { color: #999; }

      .ctrl-key {
        background: #1e1e1e;
        border: 1px solid #3a3a3a;
        border-bottom: 2px solid #3a3a3a;
        border-radius: 3px;
        padding: 2px 8px;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 0.9em;
        color: #ccc;
        white-space: nowrap;
      }

      #output { display: none; }
    </style>
  </head>
  <body>
    <div class="game-area">
      <div class="status-bar">
        <div class="spinner" id="spinner"></div>
        <span id="status">Downloading...</span>
        <progress value="0" max="100" id="progress" hidden></progress>
      </div>

      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

      <div class="controls-panel">
        <h2>Controls</h2>
        <div class="controls-grid">
          <div class="ctrl">
            <span class="ctrl-action">Move Cursor / Main Menu</span>
            <span class="ctrl-key">W &nbsp;A &nbsp;S &nbsp;D</span>
          </div>
          <div class="ctrl">
            <span class="ctrl-action">Change Tab / Item</span>
            <span class="ctrl-key">↑ &nbsp;↓ &nbsp;← &nbsp;→</span>
          </div>
          <div class="ctrl">
            <span class="ctrl-action">Select / Confirm</span>
            <span class="ctrl-key">Space</span>
          </div>
          <div class="ctrl">
            <span class="ctrl-action">Menu</span>
            <span class="ctrl-key">Esc</span>
          </div>
        </div>
      </div>
    </div>

    <textarea id="output" rows="8"></textarea>

    <script type='text/javascript'>
      var statusElement   = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement  = document.getElementById('spinner');
      var canvasElement   = document.getElementById('canvas');
      var outputElement   = document.getElementById('output');
      if (outputElement) outputElement.value = '';

      canvasElement.addEventListener('webglcontextlost', (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      var setStatus = (text) => {
        if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
        if (text === setStatus.last.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - setStatus.last.time < 30) return;
        setStatus.last.time = now;
        setStatus.last.text = text;
        if (m) {
          text = m[1];
          progressElement.value = parseInt(m[2]) * 100;
          progressElement.max   = parseInt(m[4]) * 100;
          progressElement.hidden = false;
          spinnerElement.hidden  = false;
        } else {
          progressElement.value  = null;
          progressElement.max    = null;
          progressElement.hidden = true;
          if (!text) spinnerElement.style.display = 'none';
        }
        statusElement.innerHTML = text;
      };

      var Module = {
        print(...args) {
          console.log(...args);
          if (outputElement) {
            outputElement.value += args.join(' ') + '\n';
            outputElement.scrollTop = outputElement.scrollHeight;
          }
        },
        canvas: canvasElement,
        setStatus: setStatus,
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          setStatus(left
            ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
            : 'All downloads complete.');
        }
      };
      setStatus('Downloading...');
      window.onerror = (event) => {
        setStatus('Exception thrown, see JavaScript console');
        spinnerElement.style.display = 'none';
        setStatus = (text) => { if (text) console.error('[post-exception status] ' + text); };
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
